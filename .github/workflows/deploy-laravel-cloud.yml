name: deploy-laravel-cloud

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      LARAVEL_CLOUD_DEPLOY_HOOK:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Laravel Cloud
        run: |
          curl -X POST "${{ secrets.LARAVEL_CLOUD_DEPLOY_HOOK }}?commit_hash=${{ github.sha }}"
