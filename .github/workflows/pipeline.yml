name: pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop

jobs:
  lint:
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  tests:
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  deploy:
    if: ${{ needs.lint.result == 'success' && needs.tests.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [lint, tests]
    uses: ./.github/workflows/deploy-laravel-cloud.yml
    secrets:
      LARAVEL_CLOUD_DEPLOY_HOOK: ${{ secrets.LARAVEL_CLOUD_DEPLOY_HOOK }}

  failed-notification:
    if: ${{ always() && (needs.lint.result == 'failure' || needs.tests.result == 'failure' || needs.deploy.result == 'failure') }}
    needs: [lint, tests, deploy]
    uses: ./.github/workflows/failed-notification.yml
    with:
      status: failed
      cloud_application: ${{ vars.LARAVEL_CLOUD_APPLICATION }}
      cloud_environment: ${{ vars.LARAVEL_CLOUD_ENVIRONMENT }}
    secrets:
      SLACK_WEBHOOK_MAIN: ${{ secrets.SLACK_WEBHOOK_MAIN }}

  passed:
    needs: [lint, tests]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "Lint and tests passed."
